allowBuilds:
  '@apollo/protobufjs': false
  '@compodoc/compodoc': true
  '@prisma/engines': true
  '@scarf/scarf': false
  '@swc/core': true
  prisma: true

# Force a single NestJS 11 copy across the tree. nestjs-loki-logger@0.1.0 pins
# @nestjs/common@^9 as a hard dependency, which otherwise installs a second
# (incompatible) NestJS version and breaks DynamicModule typing in app.module.
overrides:
  '@nestjs/common': ^11.1.27
  '@nestjs/core': ^11.1.27
