allowBuilds:
  "@apollo/protobufjs": false
  "@prisma/engines": true
  "@scarf/scarf": false
  "@swc/core": true
  argon2: true
  prisma: true

# Force a single NestJS 11 copy across the tree when transitive packages pin
# older major ranges of @nestjs/common or @nestjs/core.
overrides:
  "@nestjs/common": ^11.1.27
  "@nestjs/core": ^11.1.27
