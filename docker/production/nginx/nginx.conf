upstream api {
    server app:3000;
}

upstream postgres {
    server postgres:5432;
}

upstream grafana {
    server grafana:3000;
}

server {
    listen 80;
    location / {
        proxy_pass http://api;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}

server {
    listen 3000;
    location / {
        proxy_pass http://grafana;
    }
}

server {
    listen 5432;
    location / {
        proxy_pass http://postgres;
    }
}